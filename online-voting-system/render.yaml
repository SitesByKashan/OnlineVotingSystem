services:
  - type: web
    name: smartvote-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/smartvote.db
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-app.vercel.app
      - key: ACCESS_TOKEN_MINUTES
        value: 480
      - key: OTP_EXPIRY_MINUTES
        value: 10
      - key: OTP_MAX_ATTEMPTS
        value: 5
      - key: SHOW_DEV_OTP
        value: false
    disks:
      - name: smartvote-data
        mountPath: /var/data
        sizeGB: 1
